name: 更新履歴の自動生成

# main への push 時に、git 履歴から updates.html と index.html の最終更新日を再生成する。
# GITHUB_TOKEN による push は新たなワークフローを起動しないため再帰ループは起きない
# （加えてコミットメッセージに [skip ci] を付与し二重に防止）。
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-history
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト（全履歴）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 更新履歴と最終更新日を生成
        run: python3 scripts/gen_updates.py

      - name: 変更があればコミット
        run: |
          if [ -n "$(git status --porcelain updates.html index.html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add updates.html index.html
            git commit -m "chore: 更新履歴と最終更新日を自動生成 [skip ci]"
            git push
          else
            echo "更新内容に変化なし。コミットをスキップします。"
          fi
